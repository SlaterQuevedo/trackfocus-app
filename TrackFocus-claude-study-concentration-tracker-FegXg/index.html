<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackFocus — Plataforma Educativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/styles-gamification.css" />
  <link rel="stylesheet" href="assets/styles-charts.css" />
  <link rel="stylesheet" href="assets/styles-landing.css" />
  <link rel="stylesheet" href="assets/styles-multimedia.css" />
  <!-- Tema aplicado de inmediato para evitar flash de color incorrecto -->
  <script>
    (function () {
      var t = localStorage.getItem('tf-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- CDN con defer: se descargan en paralelo, no bloquean el render -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.svg" class="brand-logo" alt="TrackFocus">
      <span>TrackFocus</span>
    </div>
    <nav id="topnav" class="topnav hidden"></nav>
    <div id="userbox" class="userbox hidden">
      <span id="userLabel"></span>
      <button id="logoutBtn" class="ghost">Salir</button>
    </div>
  </header>

  <!-- Barra Pomodoro global — visible en todas las páginas cuando está activo -->
  <div id="pomBar" class="pom-bar hidden">
    <div class="pom-bar-timer">
      <span id="pomBarDisplay">25:00</span>
      <span id="pomBarMode">LISTO</span>
    </div>
    <div class="pom-bar-center">
      <select id="pomBarSubject"></select>
      <div class="pom-bar-controls">
        <button id="pomBarStart" class="primary">▶ Iniciar</button>
        <button id="pomBarPause" class="ghost">⏸</button>
        <button id="pomBarSkip" class="ghost">⏭</button>
        <button id="pomBarReset" class="ghost">↺</button>
      </div>
    </div>
    <div class="pom-bar-right">
      <label>Enf. <input type="number" id="pomBarFocus" value="25" min="1" max="120" /></label>
      <label>Des. <input type="number" id="pomBarBreak" value="5" min="1" max="30" /></label>
      <button class="ghost" id="pomBarToggle" title="Ocultar">✕</button>
    </div>
  </div>

  <main id="app" class="container"></main>

  <footer class="footer">
    <span>TrackFocus · Datos sincronizados de forma segura en la nube</span>
  </footer>

  <!-- Navegación inferior (solo móvil) — se llena dinámicamente según el rol -->
  <nav id="bottomnav" class="bottom-nav hidden"></nav>

  <!--
    Todos los scripts con defer: se descargan en paralelo al HTML y ejecutan
    en orden después del parseo, sin bloquear el render. Reduce tiempo de carga
    y uso de CPU/RAM en dispositivos de gama baja.
    Orden de dependencias preservado (ver comentarios originales).
  -->
  <script defer src="js/theme.js"></script>
  <script defer src="js/supabase-config.js"></script>
  <script defer src="js/cloud.js"></script>
  <script defer src="js/storage.js"></script>
  <script defer src="js/pilot.js"></script>
  <script defer src="js/quiz.js"></script>
  <script defer src="js/subjects.js"></script>
  <script defer src="js/stats.js"></script>
  <script defer src="js/recommend.js"></script>
  <script defer src="js/export.js"></script>
  <script defer src="js/gamification.js"></script>
  <script defer src="js/pomodoro.js"></script>
  <script defer src="js/analytics.js"></script>
  <script defer src="js/charts.js"></script>
  <script defer src="js/schools.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/sessions.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/connectivity.js"></script>
  <script defer src="js/files.js"></script>
  <script defer src="js/gemini-proxy.js"></script>
  <script defer src="js/ai-chat-proxy.js"></script>
  <script defer src="js/audio-transcriber.js"></script>
  <script defer src="js/ui-components-multimedia.js"></script>
  <script defer src="js/ui-student.js"></script>
  <script defer src="js/ui-teacher.js"></script>
  <script defer src="js/ui-eureka.js"></script>
  <script defer src="js/ui-admin.js"></script>
  <script defer src="js/roles.js"></script>
  <script defer src="js/demo.js"></script>
  <script defer src="js/app.js"></script>
  <!-- Vercel analytics solo en producción -->
  <script>
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      var vs = document.createElement('script');
      vs.defer = true;
      vs.src = '/_vercel/insights/script.js';
      document.head.appendChild(vs);
    }
  </script>
</body>
</html>
