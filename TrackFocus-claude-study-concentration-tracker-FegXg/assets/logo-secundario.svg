<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 108" fill="none">
  <defs>
    <linearGradient id="g" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C89B6D"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- SÍMBOLO centrado — escala 1.25x, trasladado para centrar en 140px -->
  <g transform="translate(25, 2) scale(1.4)">
    <path d="M 42.73 43.27 A 18 18 0 1 1 42.73 20.73"
          stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#s)"/>
    <path d="M 38.49 38.49 A 12 12 0 1 1 38.49 25.51"
          stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#s)"/>
    <path d="M 34.24 34.24 A 6 6 0 1 1 34.24 29.76"
          stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#s)"/>
    <line x1="44.54" y1="20.00" x2="50.20" y2="16.00" stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
    <line x1="46.00" y1="18.50" x2="53.00" y2="15.50" stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
    <line x1="47.00" y1="17.00" x2="56.00" y2="16.50" stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
    <line x1="47.20" y1="16.00" x2="55.50" y2="11.50" stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
    <line x1="46.50" y1="14.50" x2="53.50" y2="8.00"  stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
    <line x1="44.80" y1="12.80" x2="50.50" y2="5.50"  stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
    <line x1="42.50" y1="11.50" x2="47.00" y2="3.50"  stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#s)"/>
  </g>

  <!-- WORDMARK centrado debajo del símbolo -->
  <text x="70" y="102"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="19"
        text-anchor="middle"
        letter-spacing="0.3">
    <tspan fill="#C89B6D">Track</tspan><tspan fill="#8B5CF6">Focus</tspan>
  </text>
</svg>
