<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C89B6D"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Outer arc r=18 -->
  <path d="M 42.73 43.27 A 18 18 0 1 1 42.73 20.73"
        stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#shadow)"/>

  <!-- Middle arc r=12 -->
  <path d="M 38.49 38.49 A 12 12 0 1 1 38.49 25.51"
        stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#shadow)"/>

  <!-- Inner arc r=6 -->
  <path d="M 34.24 34.24 A 6 6 0 1 1 34.24 29.76"
        stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#shadow)"/>

  <!-- Radiating lines (right side) - varied lengths -->
  <!-- Line 1: 340° -->
  <line x1="44.54" y1="20.00" x2="50.20" y2="16.00"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Line 2: 350° -->
  <line x1="46.00" y1="18.50" x2="53.00" y2="15.50"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Line 3: 0° (longest) -->
  <line x1="47.00" y1="17.00" x2="56.00" y2="16.50"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Line 4: 10° -->
  <line x1="47.20" y1="16.00" x2="55.50" y2="11.50"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Line 5: 20° -->
  <line x1="46.50" y1="14.50" x2="53.50" y2="8.00"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Line 6: 30° -->
  <line x1="44.80" y1="12.80" x2="50.50" y2="5.50"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Line 7: 40° -->
  <line x1="42.50" y1="11.50" x2="47.00" y2="3.50"
        stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>
</svg>