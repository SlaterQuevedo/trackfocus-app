<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackFocus — Plataforma Educativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/styles-gamification.css" />
  <link rel="stylesheet" href="assets/styles-charts.css" />
  <link rel="stylesheet" href="assets/styles-landing.css" />
  <link rel="stylesheet" href="assets/styles-multimedia.css" />
  <!-- Tema aplicado de inmediato para evitar flash de color incorrecto -->
  <script>
    (function () {
      var t = localStorage.getItem('tf-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- Supabase con defer. Chart.js NO se carga aquí: se difiere y solo se
       descarga cuando se necesita un gráfico (charts.js → ensure()),
       reduciendo RAM/CPU en el arranque para equipos de gama baja. -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.svg" class="brand-logo" alt="TrackFocus">
      <span>TrackFocus</span>
    </div>
    <nav id="topnav" class="topnav hidden"></nav>
    <div id="userbox" class="userbox hidden">
      <span id="userLabel"></span>
      <button id="logoutBtn" class="ghost">Salir</button>
    </div>
  </header>

  <!-- Focus Player — reproductor flotante persistente. Los IDs son requeridos por app.js. -->
  <div id="pomBar" class="focus-player hidden">
    <div class="fp-header">
      <span class="fp-dot" id="fpDot"></span>
      <div class="fp-time-block" id="fpExpandTrigger" title="Expandir" tabindex="0" role="button" aria-label="Expandir Focus Player">
        <span id="pomBarDisplay" class="fp-clock">25:00</span>
        <span id="pomBarMode" class="fp-mode">LISTO</span>
      </div>
      <span class="fp-subject-label" id="fpSubjectLabel">—</span>
      <select id="pomBarSubject" hidden></select>
      <button id="pomBarToggle" class="fp-icon-btn" title="Ocultar">—</button>
    </div>
    <div class="fp-row">
      <button id="pomBarStart" class="primary fp-start-btn">▶ Iniciar</button>
      <button id="pomBarPause" class="fp-icon-btn">⏸</button>
      <button id="pomBarSkip" class="fp-icon-btn">⏭</button>
      <button id="pomBarReset" class="fp-icon-btn">↺</button>
      <div class="fp-durs">
        <label>Enf.<input type="number" id="pomBarFocus" value="25" min="1" max="120" class="fp-dur"/></label>
        <label>Des.<input type="number" id="pomBarBreak" value="5" min="1" max="30" class="fp-dur"/></label>
      </div>
    </div>
  </div>

  <!-- Focus Player — modal expandido (wired en focus-player.js) -->
  <div id="fpModal" class="fp-modal hidden" role="dialog" aria-modal="true" aria-label="Focus Player expandido">
    <div class="fp-modal-bg" id="fpBackdrop"></div>
    <div class="fp-modal-card">
      <div class="fp-modal-badge" id="fpModalMode">LISTO</div>
      <div class="fp-modal-clock" id="fpModalClock">25:00</div>
      <div class="fp-modal-subj" id="fpModalSubj">—</div>
      <div class="fp-modal-btns">
        <button class="primary fp-modal-btn" id="fpModalStart">▶ Iniciar</button>
        <button class="ghost fp-modal-btn" id="fpModalPause">⏸</button>
        <button class="ghost fp-modal-btn" id="fpModalSkip">⏭</button>
        <button class="ghost fp-modal-btn" id="fpModalReset">↺</button>
      </div>
      <div class="fp-modal-settings">
        <label>Materia<select id="fpModalSubjectSel" class="fp-modal-input fp-modal-subject"></select></label>
        <label>Enfoque (min)<input type="number" id="fpModalFocus" value="25" min="1" max="120" class="fp-modal-input"/></label>
        <label>Descanso (min)<input type="number" id="fpModalBreak" value="5" min="1" max="30" class="fp-modal-input"/></label>
      </div>
      <button class="ghost fp-modal-minimize" id="fpMinimize">↓ Minimizar</button>
    </div>
  </div>

  <main id="app" class="container"></main>

  <footer class="footer">
    <span>TrackFocus · Datos sincronizados de forma segura en la nube</span>
  </footer>

  <!-- Navegación inferior (solo móvil) — se llena dinámicamente según el rol -->
  <nav id="bottomnav" class="bottom-nav hidden"></nav>

  <!--
    Todos los scripts con defer: se descargan en paralelo al HTML y ejecutan
    en orden después del parseo, sin bloquear el render. Reduce tiempo de carga
    y uso de CPU/RAM en dispositivos de gama baja.
    Orden de dependencias preservado (ver comentarios originales).
  -->
  <script defer src="js/theme.js"></script>
  <script defer src="js/monitor.js"></script>
  <script defer src="js/supabase-config.js"></script>
  <script defer src="js/cloud.js"></script>
  <script defer src="js/storage.js"></script>
  <script defer src="js/pilot.js"></script>
  <script defer src="js/quiz.js"></script>
  <script defer src="js/deco.js"></script>
  <script defer src="js/goals.js"></script>
  <script defer src="js/academic-memory.js"></script>
  <script defer src="js/subjects.js"></script>
  <script defer src="js/stats.js"></script>
  <script defer src="js/recommend.js"></script>
  <script defer src="js/export.js"></script>
  <script defer src="js/gamification.js"></script>
  <script defer src="js/pomodoro.js"></script>
  <script defer src="js/analytics.js"></script>
  <script defer src="js/charts.js"></script>
  <script defer src="js/schools.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/sessions.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/connectivity.js"></script>
  <script defer src="js/files.js"></script>
  <script defer src="js/gemini-proxy.js"></script>
  <script defer src="js/ai-chat-proxy.js"></script>
  <script defer src="js/audio-transcriber.js"></script>
  <script defer src="js/ui-components-multimedia.js"></script>
  <script defer src="js/ui-student.js"></script>
  <script defer src="js/ui-teacher.js"></script>
  <script defer src="js/ui-eureka.js"></script>
  <script defer src="js/ui-admin.js"></script>
  <script defer src="js/roles.js"></script>
  <script defer src="js/demo.js"></script>
  <script defer src="js/tracky.js"></script>
  <script defer src="js/focus-player.js"></script>
  <script defer src="js/app.js"></script>
  <!-- Vercel analytics solo en producción -->
  <script>
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      var vs = document.createElement('script');
      vs.defer = true;
      vs.src = '/_vercel/insights/script.js';
      document.head.appendChild(vs);
    }
  </script>
</body>
</html>
