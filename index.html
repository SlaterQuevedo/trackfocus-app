<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackFocus — Plataforma Educativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/styles-gamification.css" />
  <link rel="stylesheet" href="assets/styles-charts.css" />
  <link rel="stylesheet" href="assets/styles-landing.css" />
  <link rel="stylesheet" href="assets/styles-multimedia.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.svg" class="brand-logo" alt="TrackFocus">
      <span>TrackFocus</span>
    </div>
    <nav id="topnav" class="topnav hidden"></nav>
    <div id="userbox" class="userbox hidden">
      <span id="userLabel"></span>
      <button id="logoutBtn" class="ghost">Salir</button>
    </div>
  </header>

  <!-- Barra Pomodoro global — visible en todas las páginas cuando está activo -->
  <div id="pomBar" class="pom-bar hidden">
    <div class="pom-bar-timer">
      <span id="pomBarDisplay">25:00</span>
      <span id="pomBarMode">LISTO</span>
    </div>
    <div class="pom-bar-center">
      <select id="pomBarSubject"></select>
      <div class="pom-bar-controls">
        <button id="pomBarStart" class="primary">▶ Iniciar</button>
        <button id="pomBarPause" class="ghost">⏸</button>
        <button id="pomBarSkip" class="ghost">⏭</button>
        <button id="pomBarReset" class="ghost">↺</button>
      </div>
    </div>
    <div class="pom-bar-right">
      <label>Enf. <input type="number" id="pomBarFocus" value="25" min="1" max="120" /></label>
      <label>Des. <input type="number" id="pomBarBreak" value="5" min="1" max="30" /></label>
      <button class="ghost" id="pomBarToggle" title="Ocultar">✕</button>
    </div>
  </div>

  <main id="app" class="container"></main>

  <footer class="footer">
    <span>TrackFocus · Datos sincronizados de forma segura en la nube</span>
  </footer>

  <!-- Navegación inferior (solo móvil) — se llena dinámicamente según el rol -->
  <nav id="bottomnav" class="bottom-nav hidden"></nav>

  <!--
    Orden de carga:
    1. Storage (base de datos local)
    2. Módulos de datos que sólo dependen de Storage
    3. Módulos de lógica que dependen de los anteriores
    4. Auth y gestión (usan Storage + módulos de datos)
    5. Sessions (usa Gamification)
    6. UI helpers
    7. UI por rol (usan todo lo anterior, referencian App en tiempo de ejecución)
    8. Roles (usa Storage, referencia App en tiempo de ejecución)
    9. App (router final, arranca la aplicación)
  -->
  <script>
    // Solo cargar analytics de Vercel en producción (no en localhost)
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      var vs = document.createElement('script');
      vs.defer = true;
      vs.src = '/_vercel/insights/script.js';
      document.head.appendChild(vs);
    }
  </script>
  <!-- Theme system (load before any UI rendering) -->
  <script src="js/theme.js"></script>
  <!-- Cloud: configuración Supabase y wrapper de sync. Deben cargarse ANTES de storage.js. -->
  <script src="js/supabase-config.js"></script>
  <script src="js/cloud.js"></script>
  <!-- Resto de módulos (orden de dependencias intacto) -->
  <script src="js/storage.js"></script>
  <script src="js/subjects.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/recommend.js"></script>
  <script src="js/export.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/pomodoro.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/schools.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/ui.js"></script>
  <!-- Módulos multimedia para AI Study -->
  <script src="js/files.js"></script>
  <script src="js/gemini-proxy.js"></script>
  <script src="js/ai-chat-proxy.js"></script>
  <script src="js/audio-transcriber.js"></script>
  <script src="js/ui-components-multimedia.js"></script>
  <!-- UI roles -->
  <script src="js/ui-student.js"></script>
  <script src="js/ui-teacher.js"></script>
  <script src="js/ui-admin.js"></script>
  <script src="js/roles.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize theme - force light mode by default
    if (!localStorage.getItem('tf-theme')) {
      localStorage.setItem('tf-theme', 'light');
    }
    Theme.init();
  </script>
</body>
</html>
